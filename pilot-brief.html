<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kungsleden Companion — Pilot</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f6f3;
    --fg: #1f2420;
    --card-bg: #ffffff;
    --border: #dedad2;
    --muted: #6b6f6a;
    --boat: #2a6f97;
    --hike: #4c7a3f;
    --waypoint: #3355cc;
    --kind: #c9700a;
    --chip-bg: #eceae4;
    --danger: #d64545;
    --critical-bg: #fdecea;
    --critical-fg: #7a1f1f;
    --tabbar-bg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171a;
      --fg: #e8e6e1;
      --card-bg: #1d2124;
      --border: #33383d;
      --muted: #9aa09b;
      --boat: #6fb3d8;
      --hike: #8fc47c;
      --waypoint: #6a85e0;
      --kind: #e08a2b;
      --chip-bg: #2a2f33;
      --danger: #e05a5a;
      --critical-bg: #3a1b1b;
      --critical-fg: #f3b6b6;
      --tabbar-bg: #1d2124;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 1rem;
    padding-bottom: 4.5rem;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.4;
  }
  button { font-family: inherit; }
  .page { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.1rem; }
  h2.section-title { font-size: 0.95rem; margin: 0 0 0.8rem; }

  .view { display: none; }
  .view.active { display: block; }

  /* alert banner (itinerary tab) */
  .banner {
    border: 1px solid var(--danger);
    background: var(--critical-bg);
    color: var(--critical-fg);
    border-radius: 10px;
    padding: 0.8rem 0.9rem;
    margin-bottom: 1.2rem;
    display: flex;
    gap: 0.55rem;
    align-items: flex-start;
    cursor: pointer;
    text-align: left;
    width: 100%;
  }
  .banner .icon { font-size: 1.2rem; line-height: 1; }
  .banner .title { font-weight: 700; margin: 0 0 0.2rem; font-size: 0.92rem; }
  .banner .summary { margin: 0; font-size: 0.85rem; }

  /* cards */
  .cards { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.55rem; }
  .stretch-title { font-size: 0.8rem; color: var(--muted); margin: 1.1rem 0 0.4rem; }
  .cards .stretch-title:first-child { margin-top: 0; }
  .gap-note { font-size: 0.78rem; color: var(--muted); font-style: italic; padding: 0.3rem 0.2rem; }
  .card {
    border: 1px solid var(--border);
    background: var(--card-bg);
    border-radius: 10px;
    padding: 0.65rem 0.85rem;
    text-align: left;
    width: 100%;
    cursor: pointer;
    color: inherit;
  }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
  .card-title { font-weight: 600; font-size: 0.92rem; }
  .card-sub { color: var(--muted); font-size: 0.78rem; white-space: nowrap; }

  /* badges (compact pills, spec: 11px font, radius 999px, one row wraps) */
  .badges { margin-top: 0.4rem; display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .badge {
    font-size: 11px;
    line-height: 1.6;
    padding: 0 0.55rem;
    border-radius: 999px;
    background: var(--chip-bg);
    color: var(--fg);
    white-space: nowrap;
  }
  .badge.boat { background: var(--boat); color: #fff; }
  .badge.hike { background: var(--hike); color: #fff; }
  .badge.waypoint { background: var(--waypoint); color: #fff; }
  .badge.kind { background: var(--kind); color: #fff; }
  .badge.alert { background: var(--danger); color: #fff; }

  /* bottom tab bar */
  .tabbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: flex;
    background: var(--tabbar-bg);
    border-top: 1px solid var(--border);
    padding: 0.3rem 0.5rem calc(0.3rem + env(safe-area-inset-bottom));
    z-index: 10;
  }
  .tabbar button {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 0.4rem 0.2rem;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
  }
  .tabbar button.active { color: var(--fg); font-weight: 600; background: var(--chip-bg); }
  .tab-count {
    position: absolute;
    top: 0.1rem;
    right: 0.6rem;
    background: var(--danger);
    color: #fff;
    font-size: 0.62rem;
    line-height: 1.5;
    min-width: 1.1rem;
    border-radius: 999px;
    padding: 0 0.25rem;
  }

  /* detail overlay */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    overflow-y: auto;
    padding: 1rem;
    padding-bottom: 2rem;
    z-index: 20;
  }
  .detail-overlay.hidden { display: none; }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 8px;
    padding: 0.35rem 0.8rem;
    font-size: 0.85rem;
    cursor: pointer;
    margin-bottom: 1rem;
  }
  .detail-content { max-width: 640px; margin: 0 auto; }
  .detail-content h2 { font-size: 1.05rem; margin: 0 0 0.7rem; }
  .detail-content h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin: 1rem 0 0.35rem; }
  .detail-content p { font-size: 0.9rem; margin: 0.3rem 0; }
  .link-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.3rem; }
  .link-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: inherit;
    border-radius: 8px;
    padding: 0.3rem 0.7rem;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .link-btn.danger { border-color: var(--danger); color: var(--danger); }

  /* proper small tables for nested data */
  table.kv-table, table.mini-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.82rem;
    margin: 0.3rem 0 0.6rem;
  }
  table.kv-table th, table.kv-table td,
  table.mini-table th, table.mini-table td {
    border: 1px solid var(--border);
    padding: 0.3rem 0.5rem;
    text-align: left;
    vertical-align: top;
  }
  table.kv-table th { width: 9rem; color: var(--muted); font-weight: 500; text-transform: capitalize; background: var(--chip-bg); }
  table.mini-table th { background: var(--chip-bg); text-transform: capitalize; }
  .na { color: var(--muted); }

  @media print {
    body { padding-bottom: 0; }
    .tabbar, button, .banner { display: none !important; }
    .view { display: block !important; margin-bottom: 1.8rem; page-break-inside: avoid; }
    .detail-overlay { display: none !important; }
  }
</style>
</head>

    { order: 3, type: "boat", from: "Stopover cabin Laitaure (shore)", to: "Aktse (shore)",
      distance_km: 3, ascent_m: 0, descent_m: 0,
      notes: "Motorboat + 3 rowing boats. WARNING: currents and shallows! 9:00/17:00 from the north, 9:15/17:15 from the south. 200 SEK. Contact Anne-Sophie: +46 70 673 55 (call the evening before a morning crossing, or at midday before an afternoon crossing).",
      camping_good: "Deep forest, great bivy spots", camping_risky: "Open bog/marshland",
      lake: "Lájtávrre", shelters: [], crossing_ids: ["aktse_laitaure"] },
    { order: 7, type: "boat", from: "Stopover cabin Svijnne (shore)", to: "STF Sitojaure cabin - Vaggevárasj (shore)",
      distance_km: null, ascent_m: 0, descent_m: 0,
      notes: "STF Sitojaure Vaggevárasj, 200-350 SEK. Motorboat 7:00/17:45 from the north, 7:15/18:00 from the south. Contact the Blind family. Note: the crossing actually spans two connected lakes, Gasskajaure and Gabddajavrre.",
      camping_good: "Forest around Aktse, low above the valley", camping_risky: "Skierffe ridge, open plains",
      lake: "Gasskajaure and Gabddajavrre", shelters: [], crossing_ids: ["sitojaure_svijnne"] },
    { order: 8, type: "hike", from: "STF Sitojaure cabin - Vaggevárasj (shore)", to: "STF Saltoluokta Station (shore)",
      distance_km: 19.3, ascent_m: 142, descent_m: 373,
      notes: "Stopover cabin Autsutjvagge along the way.",
      camping_good: "Forest sections after the crossing, sheltered bays", camping_risky: "Open lakeshore (exposed to wind)",
      lake: null,
      shelters: [{ name: "Stopover cabin Autsutjvagge", type: "emergency_shelter", position: "somewhere along this 19.3 km stretch, exact km not confirmed", notes: "Unstaffed basic shelter, no shop." }],
      crossing_ids: [] },
    { order: 9, type: "boat", from: "STF Saltoluokta Station (shore)", to: "STF Vakkotavare cabin (shore)",
      distance_km: null, ascent_m: 0, descent_m: 0,
      notes: "STF Vakkotavare -> bus (Road to Ritsem) -> Kebnats -> boat M/S Langas -> Saltoluokta. Walking alternative 30 km (+190m/-100m). See bus_vakkotavare_kebnats.json for the current 2026 timetable and a known scheduling gap around 6 September 2026.",
      camping_good: "Forest right after the start, or all the way down before Vakkotavare", camping_risky: "",
      lake: "Langas", shelters: [],
      critical_alert_id: "vakkotavare_kebnats_bus_gap_sep2026",
      crossing_ids: ["vakkotavare_kebnats_bus", "kebnats_saltoluokta"] }
  ];

  // ---- helpers ----

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function badge(text, cls) {
    return `<span class="badge${cls ? " " + cls : ""}">${escapeHtml(text)}</span>`;
  }

  function shopBadgeText(size) {
    return size === "none" ? "no shop" : `${size} shop`;
  }

  function isUrl(v) { return typeof v === "string" && /^https?:\/\//.test(v); }

  function kmOf(name) {
    const wp = waypoints.find(w => w.name === name);
    return wp ? wp.km_from_start : null;
  }

  function kmRange(leg) {
    const fromKm = kmOf(leg.from), toKm = kmOf(leg.to);
    return { fromKm, toKm, delta: +(toKm - fromKm).toFixed(1) };
  }

  function renderScalar(v) {
    if (v === null || v === undefined || v === "") return '<span class="na">—</span>';
    if (isUrl(v)) return `<a href="${escapeHtml(v)}" target="_blank" rel="noopener">${escapeHtml(v)}</a>`;
    return escapeHtml(v);
  }

  // Renders any JSON value as a "proper small table": object -> kv-table,
  // array-of-objects -> mini-table with union of columns, array-of-scalars -> comma list.
  function renderTable(value) {
    if (Array.isArray(value)) {
      if (value.length === 0) return '<span class="na">—</span>';
      if (typeof value[0] === "object") {
        const cols = [];
        value.forEach(row => Object.keys(row).forEach(k => { if (!cols.includes(k)) cols.push(k); }));
        const head = cols.map(c => `<th>${escapeHtml(c.replace(/_/g, " "))}</th>`).join("");
        const rows = value.map(row => `<tr>${cols.map(c => `<td>${renderScalar(row[c])}</td>`).join("")}</tr>`).join("");
        return `<table class="mini-table"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
      }
      return value.map(escapeHtml).join(", ");
    }
    if (typeof value === "object" && value !== null) {
      const rows = Object.entries(value).map(([k, v]) => `
        <tr><th>${escapeHtml(k.replace(/_/g, " "))}</th><td>${renderTable(v)}</td></tr>
      `).join("");
      return `<table class="kv-table"><tbody>${rows}</tbody></table>`;
    }
    return renderScalar(value);
  }

  // ---- navigation state ----

  function showTab(tab) {
    document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === "view-" + tab));
    document.querySelectorAll(".tabbar button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    closeDetail();
  }

  function openDetail(html) {
    document.getElementById("detail-content").innerHTML = html;
    document.getElementById("detail-overlay").classList.remove("hidden");
    window.scrollTo(0, 0);
  }

  function closeDetail() {
    document.getElementById("detail-overlay").classList.add("hidden");
  }

  document.querySelectorAll(".tabbar button").forEach(b => {
    b.addEventListener("click", () => showTab(b.dataset.tab));
  });
  document.getElementById("back-btn").addEventListener("click", closeDetail);

  // ---- detail page builders ----

  function alertById(id) { return alertsData.find(a => a.id === id); }
  function crossingById(id) { return crossings.find(c => c.id === id); }

  function openAlertDetail(id) {
    const a = alertById(id);
    if (!a) return;
    openDetail(`
      <h2>${escapeHtml(a.title)}</h2>
      <div class="badges">${badge(a.severity, "alert")}${badge(a.status)}</div>
      <h3>Summary</h3><p>${escapeHtml(a.short_summary)}</p>
      <h3>Trip context</h3><p>${escapeHtml(a.trip_context)}</p>
      <h3>Details</h3><p>${escapeHtml(a.details)}</p>
      <h3>Why it matters</h3><p>${escapeHtml(a.why_it_matters)}</p>
      <h3>Action required</h3>
      <table class="mini-table"><tbody>
        ${a.action_required.map(x => `<tr><td>${escapeHtml(x)}</td></tr>`).join("")}
      </tbody></table>
      <h3>Sources</h3>
      <p>Related files: ${a.related_files.join(", ")}<br>
      Source: <a href="${escapeHtml(a.source_checked)}" target="_blank" rel="noopener">${escapeHtml(a.source_checked)}</a>
      (checked ${escapeHtml(a.last_checked)}) · recheck before ${escapeHtml(a.recheck_recommended_by)}</p>
    `);
  }

  function openCrossingDetail(id) {
    const c = crossingById(id);
    if (!c) return;
    openDetail(`
      <h2>${escapeHtml(c.label)}</h2>
      <div class="badges">${badge(c.subtitle)}</div>
      ${renderTable(c.data)}
    `);
  }

  function openWaypointDetail(wp) {
    const altHtml = wp.alt_names.length
      ? `<h3>Alternative names</h3><table class="mini-table"><tbody>${wp.alt_names.map(n => `<tr><td>${escapeHtml(n)}</td></tr>`).join("")}</tbody></table>`
      : "";
    const alertHtml = wp.critical_alert_id
      ? `<div class="link-row"><button class="link-btn danger" onclick="openAlertDetail('${wp.critical_alert_id}')">⚠ View related alert</button></div>`
      : "";
    openDetail(`
      <h2>${escapeHtml(wp.name)}</h2>
      <div class="badges">
        ${badge(wp.kind, "kind")}
        ${badge(wp.type === "hut" ? "hut" : "crossing point", "waypoint")}
        ${badge(shopBadgeText(wp.shop.size))}
        ${badge(wp.shop.electricity ? "power" : "no power")}
      </div>
      <h3>Distance from start</h3><p>km ${wp.km_from_start}</p>
      ${altHtml}
      ${alertHtml}
    `);
  }

  function openLegDetail(leg) {
    const campingHtml = (leg.camping_good || leg.camping_risky) ? `
      <h3>Camping</h3>
      <table class="kv-table"><tbody>
        <tr><th>Good</th><td>${renderScalar(leg.camping_good)}</td></tr>
        <tr><th>Risky</th><td>${renderScalar(leg.camping_risky)}</td></tr>
      </tbody></table>` : "";
    const sheltersHtml = leg.shelters.length ? `
      <h3>Shelters</h3>
      <table class="mini-table"><thead><tr><th>Name</th><th>Type</th><th>Position</th><th>Notes</th></tr></thead>
      <tbody>${leg.shelters.map(s => `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.type.replace(/_/g, " "))}</td><td>${escapeHtml(s.position)}</td><td>${escapeHtml(s.notes)}</td></tr>`).join("")}</tbody></table>`
      : "";
    const crossingLinks = leg.crossing_ids.map(id => {
      const c = crossingById(id);
      return `<button class="link-btn" onclick="openCrossingDetail('${id}')">${escapeHtml(c.label)} (${escapeHtml(c.subtitle)}) →</button>`;
    }).join("");
    const alertHtml = leg.critical_alert_id
      ? `<div class="link-row"><button class="link-btn danger" onclick="openAlertDetail('${leg.critical_alert_id}')">⚠ View related alert</button></div>`
      : "";
    const { fromKm, toKm, delta } = kmRange(leg);
    const kmNote = (leg.type === "boat" && delta === 0)
      ? ` <span class="na">(trail-km markers don't advance across a lake crossing, per route.json${leg.distance_km === null ? " — physical crossing distance is not recorded for this leg" : ""})</span>`
      : "";
    openDetail(`
      <h2>Leg #${leg.order}: ${escapeHtml(leg.from)} → ${escapeHtml(leg.to)}</h2>
      <div class="badges">
        ${badge(leg.type, leg.type)}
        ${leg.distance_km !== null ? badge(leg.distance_km + " km") : ""}
        ${badge("↑" + leg.ascent_m + " m")}
        ${badge("↓" + leg.descent_m + " m")}
        ${leg.lake ? badge("lake: " + leg.lake) : ""}
        ${leg.shelters.length ? badge("shelter") : ""}
        ${leg.critical_alert_id ? badge("⚠ alert", "alert") : ""}
      </div>
      <h3>Trail kilometrage</h3><p>km ${fromKm} → ${toKm} (Δ ${delta} km)${kmNote}</p>
      <h3>Notes</h3><p>${escapeHtml(leg.notes)}</p>
      ${campingHtml}
      ${sheltersHtml}
      ${alertHtml}
      ${crossingLinks ? `<h3>Crossings on this leg</h3><div class="link-row">${crossingLinks}</div>` : ""}
    `);
  }

  // ---- itinerary tab rendering (compact cards, badges only) ----

  function waypointCard(wp) {
    const alertBadge = wp.critical_alert_id
      ? `<span class="badge alert" onclick="event.stopPropagation(); openAlertDetail('${wp.critical_alert_id}')">⚠ alert</span>` : "";
    const altBadge = wp.alt_names.length ? badge("alt name") : "";
    return `
      <button class="card" onclick="openWaypointDetail(${JSON.stringify(wp).replace(/"/g, "&quot;")})">
        <div class="card-head">
          <span class="card-title">${escapeHtml(wp.name)}</span>
          <span class="card-sub">km ${wp.km_from_start}</span>
        </div>
        <div class="badges">
          ${badge(wp.kind, "kind")}
          ${badge(wp.type === "hut" ? "hut" : "crossing point", "waypoint")}
          ${badge(shopBadgeText(wp.shop.size))}
          ${badge(wp.shop.electricity ? "power" : "no power")}
          ${altBadge}
          ${alertBadge}
        </div>
      </button>
    `;
  }

  function legCard(leg) {
    const alertBadge = leg.critical_alert_id
      ? `<span class="badge alert" onclick="event.stopPropagation(); openAlertDetail('${leg.critical_alert_id}')">⚠ alert</span>` : "";
    const { fromKm, toKm } = kmRange(leg);
    return `
      <button class="card" data-leg="${leg.order}">
        <div class="card-head">
          <span class="card-title">Leg #${leg.order}: ${escapeHtml(leg.from)} → ${escapeHtml(leg.to)}</span>
          <span class="card-sub">km ${fromKm} → ${toKm}</span>
        </div>
        <div class="badges">
          ${badge(leg.type, leg.type)}
          ${leg.distance_km !== null ? badge(leg.distance_km + " km") : ""}
          ${badge("↑" + leg.ascent_m + " m")}
          ${badge("↓" + leg.descent_m + " m")}
          ${leg.lake ? badge("lake: " + leg.lake) : ""}
          ${leg.shelters.length ? badge("shelter") : ""}
          ${alertBadge}
        </div>
      </button>
    `;
  }

  const stretches = [
    { title: "Segments #1–#3: Kvikkjokk → Aktse", legOrders: [1, 2, 3],
      gapNote: "Segments #4–#6 (Aktse cabin → Skirffe → Svijnne) are not included in this pilot." },
    { title: "Segments #7–#9: Svijnne → Vakkotavare", legOrders: [7, 8, 9], gapNote: null }
  ];

  function waypointByName(name) {
    return waypoints.find(w => w.name === name);
  }

  function renderItinerary() {
    const slot = document.getElementById("itinerary-slot");
    let html = "";
    stretches.forEach(stretch => {
      const stretchLegs = stretch.legOrders.map(o => legs.find(l => l.order === o));
      html += `<h3 class="stretch-title">${escapeHtml(stretch.title)}</h3>`;
      html += waypointCard(waypointByName(stretchLegs[0].from));
      stretchLegs.forEach(leg => {
        html += legCard(leg);
        html += waypointCard(waypointByName(leg.to));
      });
      if (stretch.gapNote) {
        html += `<div class="gap-note">⋯ ${escapeHtml(stretch.gapNote)}</div>`;
      }
    });
    slot.innerHTML = html;
    slot.querySelectorAll("button[data-leg]").forEach(btn => {
      btn.addEventListener("click", () => openLegDetail(legs.find(l => l.order === Number(btn.dataset.leg))));
    });
  }

  function renderBanner() {
    const a = alertsData[0];
    document.getElementById("banner-slot").innerHTML = `
      <button class="banner" onclick="openAlertDetail('${a.id}')">
        <span class="icon">⚠️</span>
        <div>
          <p class="title">${escapeHtml(a.title)}</p>
          <p class="summary">${escapeHtml(a.short_summary)}</p>
        </div>
      </button>
    `;
  }

  function renderAlertsTab() {
    const slot = document.getElementById("alerts-slot");
    slot.innerHTML = alertsData.map(a => `
      <button class="card" onclick="openAlertDetail('${a.id}')">
        <div class="card-head"><span class="card-title">${escapeHtml(a.title)}</span></div>
        <div class="badges">${badge(a.severity, "alert")}${badge(a.status)}</div>
      </button>
    `).join("");
    const unresolved = alertsData.filter(a => a.status === "unresolved").length;
    const countEl = document.getElementById("alert-count");
    if (unresolved > 0) { countEl.textContent = unresolved; countEl.hidden = false; }
  }

  function renderCrossingsTab() {
    const slot = document.getElementById("crossings-slot");
    slot.innerHTML = crossings.map(c => `
      <button class="card" onclick="openCrossingDetail('${c.id}')">
        <div class="card-head"><span class="card-title">${escapeHtml(c.label)}</span></div>
        <div class="badges">${badge(c.subtitle)}</div>
      </button>
    `).join("");
  }

  renderBanner();
  renderItinerary();
  renderAlertsTab();
  renderCrossingsTab();
</script>
</body>
</html>
